
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Favicon -->
    <link id="favicon" rel="icon" href="/icon-192.png">
    
    <!-- PWA / Mobile optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Juijui">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <title>Kontent OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            font-size: 16px; /* Reset base size for better scaling */
            --sidebar-width-expanded: 280px;
            --sidebar-width-collapsed: 88px;
        }
        
        @media (min-width: 1024px) {
            :root {
                font-size: 17px;
            }
        }

        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior-y: none; 
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0) 0, hsla(253,16%,7%,0) 50%, hsla(253,16%,7%,0.02) 100%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, hsla(225,39%,30%,0) 50%, hsla(225,39%,30%,0) 100%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, hsla(339,49%,30%,0) 50%, hsla(339,49%,30%,0) 100%);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        h1, h2, h3, .font-cute { font-family: 'Kanit', sans-serif; font-weight: 700; }
        .font-hand { font-family: 'Mali', cursive; }
        
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
        .font-kanit {
            font-family: 'Kanit', sans-serif;
        }
        .font-prompt {
            font-family: 'Prompt', sans-serif;
        }

        /* --- PREMIUM SIDEBAR TRANSITIONS --- */
        .sidebar-transition {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: width;
        }

        .sidebar-item-text {
            transition: opacity 0.3s ease, transform 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
        }

        .sidebar-collapsed .sidebar-item-text {
            opacity: 0;
            max-width: 0;
            transform: translateX(-10px);
            pointer-events: none;
        }

        .sidebar-expanded .sidebar-item-text {
            opacity: 1;
            max-width: 200px;
            transform: translateX(0);
        }

        .sidebar-icon {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .sidebar-collapsed .sidebar-icon {
            transform: scale(1.1);
        }

        /* --- SCROLLBAR --- */
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; visibility: hidden; }
        .sidebar-scroll:hover::-webkit-scrollbar-thumb { visibility: visible; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- ANIMATIONS --- */
        .initial-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0) 0, hsla(253,16%,7%,0) 50%, hsla(253,16%,7%,0.02) 100%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.02) 0, hsla(225,39%,30%,0) 50%, hsla(225,39%,30%,0) 100%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.02) 0, hsla(339,49%,30%,0) 50%, hsla(339,49%,30%,0) 100%);
            position: fixed;
            inset: 0;
            z-index: 99999;
        }

        .loader-logo-container {
            position: relative;
            margin-bottom: 24px;
        }

        .loader-logo-bg {
            position: absolute;
            inset: -20px;
            background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
            filter: blur(24px);
            border-radius: 50%;
            opacity: 0.6;
            animation: pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .loader-logo {
            font-size: 3.5rem;
            position: relative;
            z-index: 10;
            animation: float 4s ease-in-out infinite;
        }

        .loader-title {
            margin-top: 0.5rem; 
            font-weight: 800; 
            font-family: 'Kanit', sans-serif;
            font-size: 24px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }
        
        .loader-subtitle {
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0.8;
        }

        .loader-progress-bar {
            width: 140px;
            height: 3px;
            background-color: #f1f5f9;
            border-radius: 4px;
            margin-top: 32px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress-value {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 4px;
            animation: progress-load 2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        @keyframes progress-load {
            0% { width: 0%; left: 0%; }
            50% { width: 50%; left: 25%; }
            100% { width: 0%; left: 100%; }
        }
        
        /* Editor Page Styles */
        .page-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0,0,0,0.02);
        }

        /* Tiptap Editor Styles */
        .ProseMirror {
            outline: none;
            min-height: 200px;
        }
        .ProseMirror p.is-editor-empty:first-child::before {
            color: #adb5bd;
            content: attr(data-placeholder);
            float: left;
            height: 0;
            pointer-events: none;
        }
        .ProseMirror h1 { font-size: 2em; font-weight: 800; margin-top: 0.5em; margin-bottom: 0.25em; line-height: 1.2; }
        .ProseMirror h2 { font-size: 1.5em; font-weight: 700; margin-top: 0.5em; margin-bottom: 0.25em; line-height: 1.3; }
        .ProseMirror h3 { font-size: 1.25em; font-weight: 700; margin-top: 0.5em; margin-bottom: 0.25em; }
        .ProseMirror ul, .ProseMirror ol { padding: 0 1rem; margin: 0.5rem 0; }
        .ProseMirror ul li { list-style-type: disc; }
        .ProseMirror ol li { list-style-type: decimal; }
        .ProseMirror blockquote { border-left: 3px solid #e2e8f0; padding-left: 1rem; color: #64748b; font-style: italic; }
        
        /* Link Styles */
        .ProseMirror a { color: #4f46e5; text-decoration: underline; cursor: pointer; }
        .ProseMirror a:hover { color: #4338ca; }
    </style>
    
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const root = document.getElementById('root');
            if (root) {
                 root.innerHTML = `<div style="padding: 40px; color: #ef4444; font-family: 'Inter', sans-serif; text-align: center;"><h2>Error: ${message}</h2><button onclick="location.reload()" style="margin-top:10px; padding: 8px 16px; border:1px solid #ccc; border-radius:8px;">Reload</button></div>`;
            }
        };
        if (typeof process === 'undefined') { window.process = { env: {} }; }
    </script>

    <link rel="stylesheet" href="/index.css">
</head>
<body class="text-slate-700 antialiased">
    <div id="root">
        <div class="initial-loader">
            <div class="loader-logo-container">
                <div class="loader-logo-bg"></div>
                <div class="loader-logo">⚡</div>
            </div>
            <h1 class="loader-title">Kontent OS</h1>
            <p class="loader-subtitle">Loading System Environment</p>
            <div class="loader-progress-bar">
                <div class="loader-progress-value"></div>
            </div>
        </div>
    </div>
    <!-- Dedicated Portal Root to avoid removeChild errors -->
    <div id="portal-root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
